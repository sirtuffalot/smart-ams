<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- QR corner squares -->
  <rect x="12" y="12" width="14" height="14" rx="3" stroke="#fff" stroke-width="2.5" fill="none"/>
  <rect x="15" y="15" width="8" height="8" rx="1.5" fill="#fff"/>
  <rect x="38" y="12" width="14" height="14" rx="3" stroke="#fff" stroke-width="2.5" fill="none"/>
  <rect x="41" y="15" width="8" height="8" rx="1.5" fill="#fff"/>
  <rect x="12" y="38" width="14" height="14" rx="3" stroke="#fff" stroke-width="2.5" fill="none"/>
  <rect x="15" y="41" width="8" height="8" rx="1.5" fill="#fff"/>
  <!-- QR data dots -->
  <rect x="30" y="13" width="4" height="4" rx="1" fill="#fff" opacity="0.9"/>
  <rect x="30" y="20" width="4" height="4" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="13" y="30" width="4" height="4" rx="1" fill="#fff" opacity="0.9"/>
  <rect x="20" y="30" width="4" height="4" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="28" y="28" width="8" height="8" rx="2" fill="#fff" opacity="0.85"/>
  <rect x="40" y="30" width="4" height="4" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="47" y="30" width="4" height="4" rx="1" fill="#fff" opacity="0.9"/>
  <rect x="30" y="40" width="4" height="4" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="30" y="47" width="4" height="4" rx="1" fill="#fff" opacity="0.9"/>
